name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_RUNTIME_VERSION: 24.15.0
  PROOF_SERVER_TAG: ledger-8.0.3
  PROOF_SERVER_REPO: https://github.com/midnightntwrk/midnight-ledger.git

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone proof server source
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:PROOF_SERVER_TAG $env:PROOF_SERVER_REPO midnight-ledger

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            midnight-ledger -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled Node.js runtime
        shell: pwsh
        run: |
          $nodeDistUrl = "https://nodejs.org/dist/v$env:NODE_RUNTIME_VERSION"
          $zipName = "node-v$env:NODE_RUNTIME_VERSION-win-x64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          $checksumsPath = Join-Path $env:RUNNER_TEMP "SHASUMS256.txt"
          $extractDir = Join-Path $env:RUNNER_TEMP "node-runtime"
          $resourceDir = "src-tauri/resources/node/win-x64"

          Invoke-WebRequest "$nodeDistUrl/$zipName" -OutFile $zipPath
          Invoke-WebRequest "$nodeDistUrl/SHASUMS256.txt" -OutFile $checksumsPath

          $expected = (Select-String -Path $checksumsPath -Pattern " $zipName$").Line.Split(" ")[0]
          $actual = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Node.js checksum mismatch for $zipName. Expected $expected, got $actual."
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          Expand-Archive -Path $zipPath -DestinationPath $extractDir

          New-Item -ItemType Directory -Force $resourceDir | Out-Null
          Copy-Item -Force (Join-Path $extractDir "node-v$env:NODE_RUNTIME_VERSION-win-x64/node.exe") (Join-Path $resourceDir "node.exe")
          & (Join-Path $resourceDir "node.exe") --version

      - name: Build proof server
        shell: pwsh
        run: |
          Push-Location midnight-ledger
          cargo build --release --package midnight-proof-server
          Pop-Location

          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item -Force midnight-ledger/target/release/midnight-proof-server.exe src-tauri/binaries/midnight-proof-server-x86_64-pc-windows-msvc.exe

      - name: Build Windows NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: Check packaged sidecar inputs
        shell: pwsh
        run: |
          $required = @(
            "src-tauri/resources/node/win-x64/node.exe",
            "src-tauri/binaries/midnight-proof-server-x86_64-pc-windows-msvc.exe",
            "dist/sidecars/wallet-sync.mjs",
            "dist/sidecars/dapp-connector.mjs"
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required packaged sidecar input: $path"
            }
          }

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-finance-wallet-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Attach Windows installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
